name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ===================================
  # Backend (Python) Checks
  # ===================================
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: apex
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: apex_trading_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff mypy pytest pytest-asyncio

      - name: Lint with Ruff
        run: ruff check .
        continue-on-error: true

      - name: Type check with MyPy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests directory found, skipping."
          fi
        env:
          DATABASE_URL: postgresql://apex:test_password@localhost:5432/apex_trading_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test

  # ===================================
  # Frontend (Next.js) Checks
  # ===================================
  frontend:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found, skipping."
          fi

      - name: Lint
        run: |
          if [ -f package.json ]; then
            npm run lint
          fi
        continue-on-error: true

      - name: Type check
        run: |
          if [ -f package.json ]; then
            npm run type-check
          fi
        continue-on-error: true

      - name: Build
        run: |
          if [ -f package.json ]; then
            npm run build
          fi
        continue-on-error: true

  # ===================================
  # Security Check
  # ===================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          # Cari pattern yang mencurigakan (contoh: OpenAI key pattern)
          if grep -rnE "sk-[a-zA-Z0-9]{32,}" --include="*.py" --include="*.ts" --include="*.js" .; then
            echo "❌ POTENTIAL SECRET FOUND IN CODE!"
            exit 1
          fi
          echo "✅ No secrets found in code"
